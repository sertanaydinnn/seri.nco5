<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>seri.nco</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  background: #000;
  overflow-x: hidden;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 300;
}

/* ── FIXED CAROUSEL ──────────────────────────────────── */
#overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

#carousel {
  position: relative;
  flex-shrink: 0;
}

.thumb {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 46px;
  height: 62px;
  border-radius: 3px;
  overflow: hidden;
  will-change: transform;
  background: #111;
  box-shadow: 0 4px 20px rgba(0,0,0,0.8);
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ── CENTER GROUP — single centered column ───────────── */
#center-group {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  z-index: 11;
  pointer-events: none;
}

#center-name {
  color: rgba(255,255,255,0.85);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 0.4em;
  text-transform: lowercase;
  white-space: nowrap;
  user-select: none;
}

#archive-link {
  color: rgba(255,255,255,0.38);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 300;
  font-size: 10px;
  letter-spacing: 0.35em;
  text-transform: lowercase;
  text-decoration: none;
  white-space: nowrap;
  pointer-events: all;
  transition: color 0.3s ease;
}
#archive-link:hover { color: rgba(255,255,255,0.85); }

/* ── SCROLL VEIL: fades on first scroll, JS driven ───── */
#scroll-veil {
  position: fixed;
  inset: 0;
  z-index: 498;
  background: #000;
  pointer-events: none;
  will-change: opacity;
  -webkit-transform: translateZ(0);
  transform: translateZ(0);
}

/* ── AFK VEIL: fades in after 3s idle, CSS transition ── */
#afk-veil {
  position: fixed;
  inset: 0;
  z-index: 499;
  background: #000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.4s ease;
  will-change: opacity;
  -webkit-transform: translateZ(0);
  transform: translateZ(0);
}

/* ── HORIZONTAL STRIP ────────────────────────────────── */
#photo-strip {
  position: fixed;
  top: 0;
  left: 0;
  height: 100svh;
  display: flex;
  flex-direction: row;
  will-change: transform;
  /* force GPU layer from the start — prevents Safari promoting mid-animation */
  -webkit-transform: translate3d(0, 0, 0);
  transform: translate3d(0, 0, 0);
  z-index: 1;
  overflow: visible;
}

.photo-slide {
  height: 100svh;
  flex-shrink: 0;
  overflow: visible;
  position: relative;
}

.photo-slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  will-change: transform;
  transform-origin: center center;
  /* prevents Safari flickering on composited layers */
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}

#ig-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  color: rgba(255,255,255,0.38);
  pointer-events: all;
  transition: color 0.35s ease;
}
#ig-btn:hover { color: rgba(255,255,255,0.9); }

#ig-btn svg {
  width: 14px;
  height: 14px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}



/* ── SCROLL SPACER ───────────────────────────────────── */
#scroll-spacer { position: relative; z-index: 0; }

</style>
</head>
<body>

<div id="overlay">
  <div id="carousel">
    <div id="center-group">
      <span id="center-name">seri.nco</span>
      <a id="archive-link" href="archive.html">archive</a>
      <a id="ig-btn" href="https://www.instagram.com/seri.nco/?hl=tr" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4.5"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
        </svg>
      </a>
    </div>
  </div>
</div>

<!-- Scroll-driven veil: fades on first scroll -->
<div id="scroll-veil"></div>

<!-- AFK veil: fades IN after 3s idle, fades OUT on scroll -->
<div id="afk-veil"></div>

<div id="photo-strip"></div>
<div id="scroll-spacer"></div>

<script>
const photos = [
  'photo1.jpg',
  'photo2.jpg',
  'photo3.jpg',
  'photo4.jpg',
  'photo5.jpg',
  'photo6.jpg',
  'photo7.jpg',
  'photo8.jpg',
  'photo9.jpg',
  'photo10.jpg',
  'photo11.jpg',
  'photo12.jpg',
  'photo13.jpg',
  'photo14.jpg',
  'photo15.jpg',
  'photo16.jpg',
  // Add more here: 'photo17.jpg', 'photo18.jpg', ...
];


// ── BREAKPOINT ───────────────────────────────────────────────────────────────
function isMobile() { return window.innerWidth <= 700; }

// ── CONFIG ───────────────────────────────────────────────────────────────────
const CFG = {
  mobile: {
    photosVisible : 1,
    orbitCount    : 10,
    orbitRadius   : 138,
    carouselSize  : 320,
    scrollFactor  : 0.0006,
    scaleCenter   : 1.15,
    scaleEdge     : 1.0,   // always fills cell — no black gaps
  },
  desktop: {
    photosVisible : 3,
    orbitCount    : 16,
    orbitRadius   : 290,
    carouselSize  : 680,
    scrollFactor  : 0.0008,
    scaleCenter   : 1.24,  // center grows and overlaps neighbours
    scaleEdge     : 1.0,   // side photos always fill their cell — no black gaps
  },
};

const SCROLL_PER_SLIDE = 1.4;
const VEIL_DISTANCE    = 0.4;  // fraction of 1vh to fade scroll-veil
const AFK_DELAY        = 3000; // ms before AFK veil appears
const MOBILE_PHOTOS    = 10;   // how many unique photos cycle on mobile
const MOBILE_REPEAT    = 10;   // more loops on mobile so scroll distance feels long
const DESKTOP_REPEAT   = 5;
// matchMedia is layout-accurate at parse time; isMobile() can misfire before layout settles
const _mobileAtLoad    = window.matchMedia('(max-width: 700px)').matches;
const stripPhotos      = _mobileAtLoad ? photos.slice(0, MOBILE_PHOTOS) : photos;
const REPEAT           = _mobileAtLoad ? MOBILE_REPEAT : DESKTOP_REPEAT;
const TOTAL            = stripPhotos.length * REPEAT;

// ── ORBIT ────────────────────────────────────────────────────────────────────
const carouselEl = document.getElementById('carousel');
const thumbs     = [];
let   lastMobile = null;

function buildOrbit() {
  const mobile = isMobile();
  if (mobile === lastMobile) return;
  lastMobile = mobile;
  const cfg = mobile ? CFG.mobile : CFG.desktop;

  thumbs.forEach(t => t.remove());
  thumbs.length = 0;

  carouselEl.style.width  = cfg.carouselSize + 'px';
  carouselEl.style.height = cfg.carouselSize + 'px';

  for (let i = 0; i < cfg.orbitCount; i++) {
    const thumb = document.createElement('div');
    thumb.className = 'thumb';
    const img = document.createElement('img');
    img.src = stripPhotos[i % stripPhotos.length];
    img.alt = '';
    img.draggable = false;
    thumb.appendChild(img);
    carouselEl.appendChild(thumb);
    thumbs.push(thumb);
  }
}

function positionOrbit(angle) {
  const cfg = isMobile() ? CFG.mobile : CFG.desktop;
  for (let i = 0; i < thumbs.length; i++) {
    const a = angle + (i / thumbs.length) * Math.PI * 2;
    const x = cfg.orbitRadius * Math.cos(a);
    const y = cfg.orbitRadius * Math.sin(a);
    thumbs[i].style.transform =
      `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
  }
}

buildOrbit();
positionOrbit(0);

// ── PHOTO STRIP ──────────────────────────────────────────────────────────────
const strip     = document.getElementById('photo-strip');
const spacer    = document.getElementById('scroll-spacer');
const slides    = [];
const slideImgs = []; // cached img refs — no querySelector inside scroll loop

for (let r = 0; r < REPEAT; r++) {
  for (let i = 0; i < stripPhotos.length; i++) {
    const slide = document.createElement('div');
    slide.className = 'photo-slide';
    const img = document.createElement('img');
    img.src = stripPhotos[i];
    img.alt = '';
    img.draggable = false;
    slide.appendChild(img);
    strip.appendChild(slide);
    slides.push(slide);
    slideImgs.push(img);
  }
}

function getSlideWidth() {
  const vis = isMobile() ? CFG.mobile.photosVisible : CFG.desktop.photosVisible;
  return window.innerWidth / vis;
}

function getPhotoDelay() {
  // scroll pixels before photos start moving — veil fades during this window
  return window.innerHeight * 0.3;
}

function getMaxTranslate() {
  const mobile = isMobile();
  const vis    = mobile ? CFG.mobile.photosVisible : CFG.desktop.photosVisible;
  return (TOTAL - vis) * getSlideWidth();
}

function updateLayout() {
  buildOrbit();
  const sw     = getSlideWidth();
  slides.forEach(s => { s.style.width = sw + 'px'; });

  strip.style.left = '0px';

  spacer.style.height =
    (getMaxTranslate() / SCROLL_PER_SLIDE + getPhotoDelay() + window.innerHeight) + 'px';
}

updateLayout();
window.addEventListener('resize', () => { updateLayout(); onScroll(); });

// ── AFK VEIL ─────────────────────────────────────────────────────────────────
const afkVeil    = document.getElementById('afk-veil');
let   afkTimer   = null;
let   afkActive  = false;

function showAfkVeil() {
  afkActive = true;
  afkVeil.style.transition = 'opacity 1.4s ease';
  afkVeil.style.opacity    = '1';
}

function hideAfkVeil() {
  afkActive = false;
  afkVeil.style.transition = 'opacity 0.5s ease';
  afkVeil.style.opacity    = '0';
}

function resetAfkTimer() {
  if (afkActive) hideAfkVeil();
  clearTimeout(afkTimer);
  afkTimer = setTimeout(showAfkVeil, AFK_DELAY);
}

// Start AFK timer on load — if user never scrolls, screen fades after 3s
resetAfkTimer();

// ── SCROLL HANDLER ────────────────────────────────────────────────────────────
const scrollVeil = document.getElementById('scroll-veil');

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

function onScroll() {
  const scrollY = window.scrollY;
  const vh      = window.innerHeight;
  const vw      = window.innerWidth;
  const mobile  = isMobile();
  const cfg     = mobile ? CFG.mobile : CFG.desktop;
  const sw      = getSlideWidth();
  const delay   = getPhotoDelay();

  // 1. Orbit — always spin while scrolling
  positionOrbit(scrollY * cfg.scrollFactor);

  // 2. Veil
  scrollVeil.style.opacity = clamp(1 - scrollY / delay, 0, 1);

  // 3. Strip — translate3d hints GPU compositor for smoother compositing
  const translateX = clamp(
    Math.max(0, scrollY - delay) * SCROLL_PER_SLIDE,
    0,
    getMaxTranslate()
  );
  strip.style.transform = `translate3d(-${translateX}px, 0, 0)`;

  // 4. Scale + z-index — desktop only
  //    On mobile photosVisible=1 so there's nothing to overlap; skip entirely
  if (!mobile) {
    const screenCenter = translateX + vw / 2;
    for (let i = 0; i < slides.length; i++) {
      const slideCenter = i * sw + sw / 2;
      const rawDist     = Math.abs(slideCenter - screenCenter) / sw;
      if (rawDist > 3) continue;
      const dist  = clamp(rawDist, 0, 2);
      const t     = ease(clamp(dist, 0, 1));
      const scale = cfg.scaleCenter - t * (cfg.scaleCenter - cfg.scaleEdge);
      slideImgs[i].style.transform = `scale(${scale})`;
      slides[i].style.zIndex       = Math.round(200 - dist * 100);
    }
  }
}

// rAF throttle — scroll handler does almost nothing; all DOM work happens in rAF
let scrollRaf = null;
window.addEventListener('scroll', () => {
  if (!scrollRaf) {
    scrollRaf = requestAnimationFrame(() => {
      scrollRaf = null;
      resetAfkTimer(); // timer ops inside rAF, not in the hot scroll handler
      onScroll();
    });
  }
}, { passive: true });

onScroll();

</script>

</body>
</html>
